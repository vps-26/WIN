name: Windows Server 2025 RDP

on:
  workflow_dispatch:

jobs:
  winser-2025:
    runs-on: windows-2025
    timeout-minutes: 3600

    steps:
      - name: 🖥️ Install Virtual Display Driver
        shell: pwsh
        run: |
          Write-Host "╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║     MEMASANG VIRTUAL DISPLAY DRIVER        ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan

          $driverUrl = "https://www.amyuni.com/downloads/usbmmidd_v2.zip"
          $zipPath   = "$env:TEMP\usbmmidd.zip"
          $destDir   = "C:\virtualgpu"

          if (Test-Path $destDir) { Remove-Item -Path $destDir -Recurse -Force }
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null

          Invoke-WebRequest -Uri $driverUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $destDir -Force

          $subfolders = Get-ChildItem -Path $destDir -Directory
          if ($subfolders.Count -eq 1) {
              $subfolder = $subfolders[0].FullName
              Get-ChildItem -Path $subfolder | Move-Item -Destination $destDir -Force
              Remove-Item $subfolder -Recurse -Force
          }

          Set-Location $destDir
          $installerExe = Join-Path $destDir "deviceinstaller64.exe"
          if (-not (Test-Path $installerExe)) {
              Write-Error "❌ deviceinstaller64.exe tidak ditemukan di $destDir"
              Get-ChildItem $destDir | Format-Table Name, Length
              exit 1
          }

          Write-Host "📦 Menginstal driver..." -ForegroundColor Yellow
          & $installerExe install usbmmidd.inf usbmmidd
          if ($LASTEXITCODE -ne 0) { Write-Error "❌ Gagal install driver"; exit 1 }

          Write-Host "🖥️ Mengaktifkan monitor virtual..." -ForegroundColor Yellow
          & $installerExe enableidd 0
          if ($LASTEXITCODE -ne 0) { Write-Error "❌ Gagal enable monitor"; exit 1 }

          Write-Host "✅ Virtual display driver berhasil diinstal dan monitor aktif." -ForegroundColor Green

      - name: 🔧 Configure Core RDP Settings
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║       MENGONFIGURASI RDP & THEMES          ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "🔄 Mengaktifkan RDP..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 2 -Force

          Write-Host "🎨 Mengaktifkan Themes..." -ForegroundColor Yellow
          Set-Service -Name Themes -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name Themes -ErrorAction SilentlyContinue

          Write-Host "🖼️ Mengizinkan Wallpaper Remote..." -ForegroundColor Yellow
          $tsPoliciesPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          if (!(Test-Path $tsPoliciesPath)) { New-Item -Path $tsPoliciesPath -Force }
          Set-ItemProperty -Path $tsPoliciesPath -Name "fNoRemoteDesktopWallpaper" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fNoRemoteDesktopWallpaper" -Value 0 -Force

          Write-Host "🔥 Menambahkan Firewall Rule..." -ForegroundColor Yellow
          Remove-NetFirewallRule -DisplayName "RDP-ZeroTier" -ErrorAction SilentlyContinue
          New-NetFirewallRule -DisplayName "RDP-ZeroTier" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

          Write-Host "🔄 Merestart Service RDP..." -ForegroundColor Yellow
          Restart-Service -Name TermService -Force
          Write-Host "✅ RDP & Themes siap." -ForegroundColor Green

      - name: 👥 Setup User Accounts for RDP
        shell: pwsh
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      MENYIAPKAN AKUN RDP (2 USER)         ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan

          $password = "Redz132_"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          Write-Host "👤 Membuat akun Administrator..." -ForegroundColor Yellow
          $adminUser = "Administrator"
          if (Get-LocalUser -Name $adminUser -ErrorAction SilentlyContinue) {
              Write-Host "Menghapus Administrator lama..." -ForegroundColor Yellow
              Remove-LocalUser -Name $adminUser -ErrorAction Stop
          }
          New-LocalUser -Name $adminUser -Password $securePass -PasswordNeverExpires:$true
          Add-LocalGroupMember -Group "Administrators" -Member $adminUser -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $adminUser
          Set-LocalUser -Name $adminUser -PasswordNeverExpires:$true -AccountNeverExpires:$true
          Write-Host "✅ Administrator siap." -ForegroundColor Green

          Write-Host "👤 Mengupdate password runneradmin..." -ForegroundColor Yellow
          $runnerUser = "runneradmin"
          Set-LocalUser -Name $runnerUser -Password $securePass -PasswordNeverExpires:$true -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $runnerUser -ErrorAction SilentlyContinue
          Write-Host "✅ runneradmin password diupdate." -ForegroundColor Green

          Write-Host "`n🔑 Semua user menggunakan password: $password" -ForegroundColor Magenta

      - name: 🎮 Install OpenCL, OpenGL, & Vulkan Compatibility Pack
        shell: pwsh
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║  INSTALL OPENCL, OPENGL, VULKAN PACK      ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "📦 Menginstal Compatibility Pack..." -ForegroundColor Yellow
          winget install -e --id Microsoft.OpenCLGLVulkanCompatibilityPack --accept-source-agreements --accept-package-agreements
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "⚠️ Compatibility pack gagal, lanjutkan."
          } else {
              Write-Host "✅ OpenCL, OpenGL, Vulkan compatibility pack terinstal." -ForegroundColor Green
          }

      - name: 🎨 Set Custom Wallpaper, Lock Screen, and Profile Picture
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║   MENGATUR WALLPAPER & LOCK SCREEN        ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          $imageUrl = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTB-RSP-9VoTzs5iq09EInvD3eFJH8k1J2w2isGatNVLT67Yp7EPv8MkMg3&s=10"
          $imagePath = "C:\Windows\Web\Wallpaper\custom_image.png"
          
          Write-Host "📥 Mengunduh gambar profile..." -ForegroundColor Yellow
          Invoke-WebRequest -Uri $imageUrl -OutFile $imagePath -UseBasicParsing

          Write-Host "🖼️ Mengatur Wallpaper & Lock Screen..." -ForegroundColor Yellow
          $policyPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System"
          if (!(Test-Path $policyPath)) { New-Item -Path $policyPath -Force }
          Set-ItemProperty -Path $policyPath -Name "Wallpaper" -Value $imagePath -Force
          Set-ItemProperty -Path $policyPath -Name "WallpaperStyle" -Value "2" -Force

          $persPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization"
          if (!(Test-Path $persPath)) { New-Item -Path $persPath -Force }
          Set-ItemProperty -Path $persPath -Name "LockScreenImage" -Value $imagePath -Force

          Write-Host "👤 Mengatur Profile Picture..." -ForegroundColor Yellow
          $userPicDir = "C:\ProgramData\Microsoft\User Account Pictures"
          Copy-Item -Path $imagePath -Destination "$userPicDir\user.png" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user.jpg" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user.bmp" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user-32.png" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user-40.png" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user-48.png" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user-192.png" -Force
          Write-Host "✅ Wallpaper & lockscreen siap." -ForegroundColor Green

      - name: 📜 Create Logon Startup Script
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║   MEMBUAT SCRIPT LOGON WALLPAPER          ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "📝 Membuat script startup..." -ForegroundColor Yellow
          $scriptContent = @'
          Start-Sleep -Seconds 3
          $imagePath = "C:\Windows\Web\Wallpaper\custom_image.png"
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name "Wallpaper" -Value $imagePath -Force
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name "WallpaperStyle" -Value "2" -Force
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name "TileWallpaper" -Value "0" -Force

          $code = @"
          using System;
          using System.Runtime.InteropServices;
          public class Wallpaper {
              [DllImport("user32.dll", CharSet = CharSet.Auto)]
              public static extern int SystemParametersInfo(int uAction, int uParam, string lvParam, int fuWinIni);
          }
          "@
          Add-Type -TypeDefinition $code -ErrorAction SilentlyContinue
          [Wallpaper]::SystemParametersInfo(20, 0, $imagePath, 3)

          $userDesktop = [Environment]::GetFolderPath("Desktop")
          if (Test-Path $userDesktop) {
              Get-ChildItem -Path $userDesktop -File | Where-Object {
                  $_.Extension -in @(".lnk", ".url") -and 
                  $_.Name -notlike "*Chrome*" -and 
                  $_.Name -notlike "*Edge*"
              } | Remove-Item -Force -ErrorAction SilentlyContinue
          }
          Stop-Process -Name explorer -Force
          '@
          $scriptPath = "C:\Windows\set_wallpaper.ps1"
          $scriptContent | Out-File -FilePath $scriptPath -Encoding utf8 -Force
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" -Name "SetCustomWallpaper" -Value "PowerShell.exe -NoProfile -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Windows\set_wallpaper.ps1" -Force
          Write-Host "✅ Script logon terpasang." -ForegroundColor Green

      - name: 🧹 Clean Global Desktop Shortcuts
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║     MEMBERSIHKAN SHORTCUT PUBLIK         ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "🧹 Membersihkan desktop publik..." -ForegroundColor Yellow
          $desktopPaths = @("C:\Users\Public\Desktop", "C:\Users\Default\Desktop")
          foreach ($path in $desktopPaths) {
              if (Test-Path $path) {
                  Get-ChildItem -Path $path -File | Where-Object {
                      $_.Extension -in @(".lnk", ".url") -and 
                      $_.Name -notlike "*Chrome*" -and 
                      $_.Name -notlike "*Edge*"
                  } | Remove-Item -Force -ErrorAction SilentlyContinue
              }
          }
          Write-Host "✅ Desktop publik bersih." -ForegroundColor Green

      # ======================== ZEROTIER INSTALL & JOIN ========================
      - name: 🔗 Install ZeroTier
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║        MENGINSTALL ZEROTIER                ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "📥 Mengunduh ZeroTier installer..." -ForegroundColor Yellow
          $installerUrl = "https://download.zerotier.com/dist/ZeroTier%20One.msi"
          $installerPath = "$env:TEMP\zerotier.msi"
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing
          
          Write-Host "📦 Menginstal ZeroTier (silent)..." -ForegroundColor Yellow
          Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait
          Remove-Item $installerPath -Force
          
          # Tunggu hingga service muncul
          Write-Host "⏳ Menunggu service ZeroTier muncul..." -ForegroundColor Yellow
          $ztService = $null
          for ($i = 0; $i -lt 20; $i++) {
              $ztService = Get-Service -Name "*ZeroTier*" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($ztService) { break }
              Start-Sleep -Seconds 3
          }
          
          if (-not $ztService) {
              Write-Error "❌ Service ZeroTier tidak ditemukan setelah instalasi."
              # Coba cek apakah file CLI ada
              $ztCli = "$env:ProgramFiles\ZeroTier\One\zerotier-cli.exe"
              if (Test-Path $ztCli) {
                  Write-Host "ℹ️  File zerotier-cli ditemukan, tapi service tidak berjalan." -ForegroundColor Yellow
              } else {
                  Write-Error "Instalasi ZeroTier kemungkinan gagal."
                  exit 1
              }
              exit 1
          }
          
          Write-Host "✅ Service ZeroTier ditemukan: $($ztService.Name)" -ForegroundColor Green
          
          # Mulai service jika belum running
          if ($ztService.Status -ne 'Running') {
              Write-Host "🔄 Memulai service ZeroTier..." -ForegroundColor Yellow
              Start-Service -Name $ztService.Name -ErrorAction Stop
              Set-Service -Name $ztService.Name -StartupType Automatic
          } else {
              Write-Host "✅ Service ZeroTier sudah berjalan." -ForegroundColor Green
          }

      - name: 🌐 Join ZeroTier Network
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║     JOIN KE ZEROTIER NETWORK               ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          # Temukan path zerotier-cli (mungkin di Program Files atau Program Files (x86))
          $possiblePaths = @(
              "$env:ProgramFiles\ZeroTier\One\zerotier-cli.exe",
              "${env:ProgramFiles(x86)}\ZeroTier\One\zerotier-cli.exe"
          )
          $ztCli = $null
          foreach ($p in $possiblePaths) {
              if (Test-Path $p) {
                  $ztCli = $p
                  break
              }
          }
          
          if (-not $ztCli) {
              Write-Error "❌ zerotier-cli.exe tidak ditemukan."
              exit 1
          }
          
          $networkId = "76fc96e4984c9d13"
          
          Write-Host "🔗 Menggabungkan ke network $networkId ..." -ForegroundColor Yellow
          & $ztCli join $networkId
          if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Gagal join network ZeroTier."
              exit 1
          }
          
          Write-Host "⏳ Menunggu IP diberikan oleh ZeroTier..." -ForegroundColor Yellow
          $ztIP = $null
          $retries = 0
          while (-not $ztIP -and $retries -lt 30) {
              $netInfo = & $ztCli listnetworks | Select-String -Pattern $networkId
              if ($netInfo) {
                  # Format: 200 listnetworks <nwid> <name> <mac> <status> <type> <dev> <assigned addresses>
                  $parts = $netInfo -split '\s+'
                  if ($parts.Count -ge 8) {
                      $assigned = $parts[7]  # biasanya IP
                      if ($assigned -and $assigned -match '\d+\.\d+\.\d+\.\d+') {
                          $ztIP = $assigned
                      }
                  }
              }
              if (-not $ztIP) {
                  Start-Sleep -Seconds 5
                  $retries++
              }
          }
          
          if (-not $ztIP) {
              Write-Error "❌ Gagal mendapatkan IP dari ZeroTier dalam waktu yang ditentukan."
              Write-Host "ℹ️  Pastikan network ID benar dan sudah di-approve di my.zerotier.com" -ForegroundColor Yellow
              exit 1
          }
          
          Write-Host "✅ Berhasil join network, IP: $ztIP" -ForegroundColor Green
          "ZEROTIER_IP=$ztIP" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 📡 Verify RDP Accessibility
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      MEMVERIFIKASI KONEKSI RDP           ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          $ip = $env:ZEROTIER_IP
          Write-Host "🔍 Mengecek koneksi ke $ip ..." -ForegroundColor Yellow
          $testResult = Test-NetConnection -ComputerName $ip -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "Koneksi RDP internal gagal!"
              exit 1
          }
          Write-Host "✅ Port 3389 terbuka, RDP siap." -ForegroundColor Green

      - name: ⏳ Maintain Connection
        run: |
          $ip = $env:ZEROTIER_IP
          $pass = "Redz132_"
          
          Write-Host "`n╔══════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║          KONEKSI RDP SIAP DIGUNAKAN            ║" -ForegroundColor Green
          Write-Host "╠══════════════════════════════════════════════════╣" -ForegroundColor Green
          Write-Host "║  🌍 IP ZeroTier   : $ip" -ForegroundColor White
          Write-Host "║  👤 User 1        : Administrator" -ForegroundColor White
          Write-Host "║  👤 User 2        : runneradmin" -ForegroundColor White
          Write-Host "║  🔑 Password      : $pass" -ForegroundColor White
          Write-Host "╚══════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host "`n💡 Silakan gunakan Remote Desktop Connection." -ForegroundColor Yellow
          Write-Host "🛑 Tekan Cancel pada workflow untuk mengakhiri.`n" -ForegroundColor Yellow
          
          while ($true) {
              Write-Host "[$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')] 🟢 Runner tetap aktif..." -ForegroundColor DarkGray
              Start-Sleep -Seconds 180
          }
          $installerExe = Join-Path $destDir "deviceinstaller64.exe"
          if (-not (Test-Path $installerExe)) {
              Write-Error "❌ deviceinstaller64.exe tidak ditemukan di $destDir"
              Get-ChildItem $destDir | Format-Table Name, Length
              exit 1
          }

          Write-Host "📦 Menginstal driver..." -ForegroundColor Yellow
          & $installerExe install usbmmidd.inf usbmmidd
          if ($LASTEXITCODE -ne 0) { Write-Error "❌ Gagal install driver"; exit 1 }

          Write-Host "🖥️ Mengaktifkan monitor virtual..." -ForegroundColor Yellow
          & $installerExe enableidd 0
          if ($LASTEXITCODE -ne 0) { Write-Error "❌ Gagal enable monitor"; exit 1 }

          Write-Host "✅ Virtual display driver berhasil diinstal dan monitor aktif." -ForegroundColor Green

      - name: 🔧 Configure Core RDP Settings
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║       MENGONFIGURASI RDP & THEMES          ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "🔄 Mengaktifkan RDP..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 2 -Force

          Write-Host "🎨 Mengaktifkan Themes..." -ForegroundColor Yellow
          Set-Service -Name Themes -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name Themes -ErrorAction SilentlyContinue

          Write-Host "🖼️ Mengizinkan Wallpaper Remote..." -ForegroundColor Yellow
          $tsPoliciesPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          if (!(Test-Path $tsPoliciesPath)) { New-Item -Path $tsPoliciesPath -Force }
          Set-ItemProperty -Path $tsPoliciesPath -Name "fNoRemoteDesktopWallpaper" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fNoRemoteDesktopWallpaper" -Value 0 -Force

          Write-Host "🔥 Menambahkan Firewall Rule..." -ForegroundColor Yellow
          Remove-NetFirewallRule -DisplayName "RDP-ZeroTier" -ErrorAction SilentlyContinue
          New-NetFirewallRule -DisplayName "RDP-ZeroTier" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

          Write-Host "🔄 Merestart Service RDP..." -ForegroundColor Yellow
          Restart-Service -Name TermService -Force
          Write-Host "✅ RDP & Themes siap." -ForegroundColor Green

      - name: 👥 Setup User Accounts for RDP
        shell: pwsh
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      MENYIAPKAN AKUN RDP (2 USER)         ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan

          $password = "Redz132_"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          Write-Host "👤 Membuat akun Administrator..." -ForegroundColor Yellow
          $adminUser = "Administrator"
          if (Get-LocalUser -Name $adminUser -ErrorAction SilentlyContinue) {
              Write-Host "Menghapus Administrator lama..." -ForegroundColor Yellow
              Remove-LocalUser -Name $adminUser -ErrorAction Stop
          }
          New-LocalUser -Name $adminUser -Password $securePass -PasswordNeverExpires:$true
          Add-LocalGroupMember -Group "Administrators" -Member $adminUser -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $adminUser
          Set-LocalUser -Name $adminUser -PasswordNeverExpires:$true -AccountNeverExpires:$true
          Write-Host "✅ Administrator siap." -ForegroundColor Green

          Write-Host "👤 Mengupdate password runneradmin..." -ForegroundColor Yellow
          $runnerUser = "runneradmin"
          Set-LocalUser -Name $runnerUser -Password $securePass -PasswordNeverExpires:$true -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $runnerUser -ErrorAction SilentlyContinue
          Write-Host "✅ runneradmin password diupdate." -ForegroundColor Green

          Write-Host "`n🔑 Semua user menggunakan password: $password" -ForegroundColor Magenta

      - name: 🎮 Install OpenCL, OpenGL, & Vulkan Compatibility Pack
        shell: pwsh
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║  INSTALL OPENCL, OPENGL, VULKAN PACK      ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "📦 Menginstal Compatibility Pack..." -ForegroundColor Yellow
          winget install -e --id Microsoft.OpenCLGLVulkanCompatibilityPack --accept-source-agreements --accept-package-agreements
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "⚠️ Compatibility pack gagal, lanjutkan."
          } else {
              Write-Host "✅ OpenCL, OpenGL, Vulkan compatibility pack terinstal." -ForegroundColor Green
          }

      - name: 🎨 Set Custom Wallpaper, Lock Screen, and Profile Picture
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║   MENGATUR WALLPAPER & LOCK SCREEN        ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          $imageUrl = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTB-RSP-9VoTzs5iq09EInvD3eFJH8k1J2w2isGatNVLT67Yp7EPv8MkMg3&s=10"
          $imagePath = "C:\Windows\Web\Wallpaper\custom_image.png"
          
          Write-Host "📥 Mengunduh gambar profile..." -ForegroundColor Yellow
          Invoke-WebRequest -Uri $imageUrl -OutFile $imagePath -UseBasicParsing

          Write-Host "🖼️ Mengatur Wallpaper & Lock Screen..." -ForegroundColor Yellow
          $policyPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System"
          if (!(Test-Path $policyPath)) { New-Item -Path $policyPath -Force }
          Set-ItemProperty -Path $policyPath -Name "Wallpaper" -Value $imagePath -Force
          Set-ItemProperty -Path $policyPath -Name "WallpaperStyle" -Value "2" -Force

          $persPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization"
          if (!(Test-Path $persPath)) { New-Item -Path $persPath -Force }
          Set-ItemProperty -Path $persPath -Name "LockScreenImage" -Value $imagePath -Force

          Write-Host "👤 Mengatur Profile Picture..." -ForegroundColor Yellow
          $userPicDir = "C:\ProgramData\Microsoft\User Account Pictures"
          Copy-Item -Path $imagePath -Destination "$userPicDir\user.png" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user.jpg" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user.bmp" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user-32.png" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user-40.png" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user-48.png" -Force
          Copy-Item -Path $imagePath -Destination "$userPicDir\user-192.png" -Force
          Write-Host "✅ Wallpaper & lockscreen siap." -ForegroundColor Green

      - name: 📜 Create Logon Startup Script
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║   MEMBUAT SCRIPT LOGON WALLPAPER          ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "📝 Membuat script startup..." -ForegroundColor Yellow
          $scriptContent = @'
          Start-Sleep -Seconds 3
          $imagePath = "C:\Windows\Web\Wallpaper\custom_image.png"
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name "Wallpaper" -Value $imagePath -Force
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name "WallpaperStyle" -Value "2" -Force
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name "TileWallpaper" -Value "0" -Force

          $code = @"
          using System;
          using System.Runtime.InteropServices;
          public class Wallpaper {
              [DllImport("user32.dll", CharSet = CharSet.Auto)]
              public static extern int SystemParametersInfo(int uAction, int uParam, string lvParam, int fuWinIni);
          }
          "@
          Add-Type -TypeDefinition $code -ErrorAction SilentlyContinue
          [Wallpaper]::SystemParametersInfo(20, 0, $imagePath, 3)

          $userDesktop = [Environment]::GetFolderPath("Desktop")
          if (Test-Path $userDesktop) {
              Get-ChildItem -Path $userDesktop -File | Where-Object {
                  $_.Extension -in @(".lnk", ".url") -and 
                  $_.Name -notlike "*Chrome*" -and 
                  $_.Name -notlike "*Edge*"
              } | Remove-Item -Force -ErrorAction SilentlyContinue
          }
          Stop-Process -Name explorer -Force
          '@
          $scriptPath = "C:\Windows\set_wallpaper.ps1"
          $scriptContent | Out-File -FilePath $scriptPath -Encoding utf8 -Force
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" -Name "SetCustomWallpaper" -Value "PowerShell.exe -NoProfile -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Windows\set_wallpaper.ps1" -Force
          Write-Host "✅ Script logon terpasang." -ForegroundColor Green

      - name: 🧹 Clean Global Desktop Shortcuts
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║     MEMBERSIHKAN SHORTCUT PUBLIK         ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "🧹 Membersihkan desktop publik..." -ForegroundColor Yellow
          $desktopPaths = @("C:\Users\Public\Desktop", "C:\Users\Default\Desktop")
          foreach ($path in $desktopPaths) {
              if (Test-Path $path) {
                  Get-ChildItem -Path $path -File | Where-Object {
                      $_.Extension -in @(".lnk", ".url") -and 
                      $_.Name -notlike "*Chrome*" -and 
                      $_.Name -notlike "*Edge*"
                  } | Remove-Item -Force -ErrorAction SilentlyContinue
              }
          }
          Write-Host "✅ Desktop publik bersih." -ForegroundColor Green

      # ======================== ZEROTIER INSTALL & JOIN ========================
      - name: 🔗 Install ZeroTier
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║        MENGINSTALL ZEROTIER                ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          Write-Host "📥 Mengunduh ZeroTier installer..." -ForegroundColor Yellow
          $installerUrl = "https://download.zerotier.com/dist/ZeroTier%20One.msi"
          $installerPath = "$env:TEMP\zerotier.msi"
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
          
          Write-Host "📦 Menginstal ZeroTier (silent)..." -ForegroundColor Yellow
          Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait
          Remove-Item $installerPath -Force
          
          # Pastikan service berjalan
          Start-Sleep -Seconds 5
          Write-Host "🔄 Memulai service ZeroTier..." -ForegroundColor Yellow
          Start-Service -Name ZeroTierOne -ErrorAction SilentlyContinue
          Set-Service -Name ZeroTierOne -StartupType Automatic
          
          Write-Host "✅ ZeroTier terinstal dan service berjalan." -ForegroundColor Green

      - name: 🌐 Join ZeroTier Network
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║     JOIN KE ZEROTIER NETWORK               ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          $ztCli = "$env:ProgramFiles\ZeroTier\One\zerotier-cli.exe"
          $networkId = "76fc96e4984c9d13"
          
          Write-Host "🔗 Menggabungkan ke network $networkId ..." -ForegroundColor Yellow
          & $ztCli join $networkId
          if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Gagal join network ZeroTier."
              exit 1
          }
          
          Write-Host "⏳ Menunggu IP diberikan oleh ZeroTier..." -ForegroundColor Yellow
          $ztIP = $null
          $retries = 0
          while (-not $ztIP -and $retries -lt 30) {
              $netInfo = & $ztCli listnetworks | Select-String -Pattern $networkId
              if ($netInfo) {
                  # Format: 200 listnetworks <nwid> <name> <mac> <status> <type> <dev> <assigned addresses>
                  $parts = $netInfo -split '\s+'
                  if ($parts.Count -ge 8) {
                      $assigned = $parts[7]  # biasanya IP
                      if ($assigned -and $assigned -match '\d+\.\d+\.\d+\.\d+') {
                          $ztIP = $assigned
                      }
                  }
              }
              if (-not $ztIP) {
                  Start-Sleep -Seconds 5
                  $retries++
              }
          }
          
          if (-not $ztIP) {
              Write-Error "❌ Gagal mendapatkan IP dari ZeroTier dalam waktu yang ditentukan."
              Write-Host "ℹ️  Pastikan network ID benar dan sudah di-approve di my.zerotier.com" -ForegroundColor Yellow
              exit 1
          }
          
          Write-Host "✅ Berhasil join network, IP: $ztIP" -ForegroundColor Green
          "ZEROTIER_IP=$ztIP" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 📡 Verify RDP Accessibility
        run: |
          Write-Host "`n╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      MEMVERIFIKASI KONEKSI RDP           ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          $ip = $env:ZEROTIER_IP
          Write-Host "🔍 Mengecek koneksi ke $ip ..." -ForegroundColor Yellow
          $testResult = Test-NetConnection -ComputerName $ip -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "Koneksi RDP internal gagal!"
              exit 1
          }
          Write-Host "✅ Port 3389 terbuka, RDP siap." -ForegroundColor Green

